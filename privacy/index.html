<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savoria</title>
<link rel="icon" type="image/png" href="/icon-512.png">
<link rel="alternate" hreflang="fr" href="https://savoria.jeylab.fr/fr/privacy/">
<link rel="alternate" hreflang="en" href="https://savoria.jeylab.fr/en/privacy/">
<link rel="alternate" hreflang="x-default" href="https://savoria.jeylab.fr/fr/privacy/">
<meta name="robots" content="noindex,follow">
<meta http-equiv="refresh" content="0; url=/fr/privacy/">
<script>
  // Redirection de commodité vers la langue de l'utilisateur. Les crawlers ignorent ce JS
  // et découvrent chaque langue via les hreflang ci-dessus (contenu pré-rendu, pas de JS requis).
  var LANGS = ["fr", "en"];
  var stored; try { stored = localStorage.getItem('savoria_lang'); } catch(e) {}
  var param = new URLSearchParams(location.search).get('lang');
  var nav = (navigator.language || '').toLowerCase();
  var browser = LANGS.filter(function(l){ return nav.indexOf(l) === 0; })[0];
  var pick = [param, stored, browser].filter(function(l){ return LANGS.indexOf(l) >= 0; })[0] || 'fr';
  location.replace('/' + pick + '/privacy/' + location.hash);
</script>
</head>
<body>
<p style="font:16px system-ui;padding:24px">Savoria — <a href="/fr/privacy/">Français</a> · <a href="/en/privacy/">English</a></p>
</body>
</html>
